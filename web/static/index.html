<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Umpire — Code Review</title>
  <link rel="stylesheet" href="/css/diff2html.min.css">
  <link rel="stylesheet" href="/css/app.css">
</head>
<body>
  <header id="top-bar">
    <h1>Umpire</h1>
    <span id="branch-info"></span>
  </header>

  <div id="layout">
    <aside id="sidebar"></aside>
    <div id="resize-handle"></div>
    <main id="diff-container"></main>
  </div>

  <footer id="submit-bar">
    <textarea id="review-summary" placeholder="Write a summary of your review..." rows="2"></textarea>
    <div id="submit-actions">
      <span id="comment-count">0 comments</span>
      <button id="submit-review" class="btn btn-submit">Submit Review</button>
    </div>
  </footer>

  <script src="/js/highlight.min.js"></script>
  <script src="/js/diff2html-ui.min.js"></script>
  <script src="/js/api.js"></script>
  <script src="/js/review.js"></script>
  <script src="/js/diff-view.js"></script>
  <script src="/js/sidebar.js"></script>
  <script src="/js/diff-expander.js"></script>
  <script src="/js/resize.js"></script>
  <script src="/js/app.js"></script>
</body>
</html>
